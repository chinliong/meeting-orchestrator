# Render Blueprint — deploys backend + frontend from this repo.
# In the Render dashboard: New → Blueprint → point at this repo. After the first deploy,
# set ANTHROPIC_API_KEY (marked sync:false) in the backend service's Environment tab.
#
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: orchestrator-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # set manually in the dashboard (secret)
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      # Signing secret for account auth tokens — Render generates a strong random value.
      - key: AUTH_SECRET
        generateValue: true
      # External Postgres (e.g. Neon). Paste the connection string in the dashboard —
      # postgresql://...neon.tech/<db>?sslmode=require. db.py normalises postgres:// URLs.
      - key: DATABASE_URL
        sync: false
      # Set to the deployed frontend origin after its first deploy,
      # e.g. https://orchestrator-frontend.onrender.com
      - key: CORS_ORIGINS
        sync: false
      # Hosted Whisper transcription (Objective 4). Set the key in the dashboard.
      # Leave BASE_URL/MODEL unset for OpenAI; for Groq set BASE_URL to
      # https://api.groq.com/openai/v1 and MODEL to whisper-large-v3-turbo
      # (turbo is faster than whisper-large-v3 at near-identical accuracy).
      - key: TRANSCRIPTION_API_KEY
        sync: false
      - key: TRANSCRIPTION_BASE_URL
        sync: false
      - key: TRANSCRIPTION_MODEL
        sync: false
      # Outbound email for password-reset codes. Leave SMTP_HOST unset to disable sending
      # (codes are logged instead). For Gmail: host=smtp.gmail.com, port=587, user=your
      # address, password=a Google App Password (requires 2FA). Brevo/SendGrid also work.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: meeting-orchestrator
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Baked into the client bundle at BUILD time, so it needs the full backend URL
      # including scheme and the /api/v1 path. Set this after the backend's first deploy,
      # e.g. https://orchestrator-backend.onrender.com/api/v1, then trigger a frontend rebuild.
      - key: NEXT_PUBLIC_API_BASE
        sync: false
